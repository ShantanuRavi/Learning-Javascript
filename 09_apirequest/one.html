<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning api</title>
  <style>
    table,th,td{
      border: 1px solid white;
    }
    body{
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>
    <table>
    <tr>
      <th>Value</th>
      <th>State</th>
      <th>Description</th>
    </tr>
    <tr>
      <td>0</td>
      <td>UNSENT</td>
      <td>Client has been created. open() not called yet.</td>
    </tr>

    <tr>
      <td>1</td>
      <td>OPENED</td>
      <td>open() has been called.</td>
    </tr>

    <tr>
      <td>2</td>
      <td>HEADERS_RECEIVED</td>
      <td>send() has been called, and headers and status are available.</td>
    </tr>

    <tr>
      <td>3</td>
      <td>LOADING</td>
      <td>Downloading; responseText holds partial data.</td>
    </tr>

    <tr>
      <td>4</td>
      <td>DONE</td>
      <td>The operation is complete.</td>
    </tr>
  </table>
  <div id="canvas">
  </div>
</body>
<script>
  const requrl = "https://api.github.com/users/shantanuravi"
  let xhr = new XMLHttpRequest();
  xhr.open("GET",requrl);
  xhr.send();
  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4)
    {
      const data = JSON.parse(this.responseText);
      // console.log(data.avatar_url);
      document.getElementById("canvas").innerHTML = `<img src="${data.avatar_url}" width="50" height="50"></img>`
    }
  }
</script>
</html>
